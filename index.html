<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea Zvono Design — Uskoro</title>
<meta name="description" content="Andrea Zvono Design — nova web stranica uskoro.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/jpeg" href="/favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --crna:#2b2b2b;
    --siva:#9e9e9e;
    --siva-t:#757575;
    --pink:#e0117a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Roboto',sans-serif;font-weight:300;color:var(--siva-t);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 24px;overflow-x:hidden;background:#fff;
  }
  .mrlja{
    position:fixed;pointer-events:none;z-index:-1;filter:blur(24px);
    background:
      radial-gradient(closest-side at 38% 42%, rgba(224,17,122,.20), transparent 72%),
      radial-gradient(closest-side at 64% 58%, rgba(240,124,182,.16), transparent 70%),
      radial-gradient(closest-side at 52% 70%, rgba(224,17,122,.10), transparent 75%);
    border-radius:46% 54% 58% 42%/52% 44% 56% 48%;
  }
  .logo{height:74px;mix-blend-mode:multiply;margin-bottom:14px}
  .ime{
    font-size:26px;letter-spacing:.42em;text-transform:uppercase;color:var(--crna);
    padding-left:.42em;
  }
  .ime small{
    display:block;font-size:10px;letter-spacing:.55em;color:var(--siva);margin-top:4px;
  }
  .foto{
    width:min(420px,86vw);aspect-ratio:4/5;object-fit:cover;object-position:center top;
    margin:36px 0 32px;box-shadow:0 24px 60px rgba(224,17,122,.14);
  }
  h1{
    font-size:15px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;
    color:var(--siva);margin-bottom:10px;
  }
  .pod{font-size:14.5px;max-width:340px;margin:0 auto 34px}
  form{
    display:flex;gap:0;width:min(320px,86vw);margin:0 auto;
    border-bottom:1px solid var(--siva);
  }
  input{
    flex:1;border:none;outline:none;background:none;
    font-family:inherit;font-size:14px;letter-spacing:.08em;padding:10px 2px;color:var(--crna);
  }
  input::placeholder{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#bbb}
  button{
    border:none;background:none;cursor:pointer;color:var(--siva-t);
    font-family:inherit;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    padding:10px 2px;transition:color .25s;
  }
  button:hover{color:var(--pink)}
  .greska{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);
    margin-top:14px;visibility:hidden;
  }
  .greska.vidi{visibility:visible}
  .ig{
    margin-top:44px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--siva);text-decoration:none;border-bottom:1px solid var(--siva);
    padding-bottom:4px;transition:.25s;
  }
  .ig:hover{color:var(--pink);border-color:var(--pink)}
  @media (max-width:760px){
    body{padding:24px 20px;justify-content:flex-start}
    .logo{height:52px;margin-bottom:8px}
    .ime{font-size:19px;letter-spacing:.3em}
    .ime small{font-size:9px;letter-spacing:.4em}
    .foto{height:30vh;width:auto;aspect-ratio:4/5;margin:20px 0 18px}
    h1{font-size:13px;margin-bottom:6px}
    .pod{font-size:13px;margin-bottom:20px;max-width:300px}
    .greska{margin-top:10px}
    .ig{margin-top:24px}
  }
</style>
</head>
<body>

<i class="mrlja" style="width:420px;height:320px;top:-80px;left:-100px"></i>
<i class="mrlja" style="width:460px;height:340px;top:30%;right:-140px;transform:rotate(12deg)"></i>
<i class="mrlja" style="width:400px;height:300px;bottom:-90px;left:16%;transform:rotate(-9deg)"></i>

<img class="logo" src="/az-logo.jpg" alt="AZ monogram">
<div class="ime" translate="no">Andrea Zvono<small>Design</small></div>

<img class="foto" src="/fotke/zuta-1.jpg" alt="Andrea Zvono Design — kreacija">

<h1>Stranica je u izradi</h1>
<p class="pod">Radimo na nečem lijepom. Nova kolekcija i web stranica stižu uskoro.</p>

<form onsubmit="event.preventDefault(); const u=this.querySelector('input').value; if(btoa(u)==='YW5kcmVhMjAyNg=='){sessionStorage.setItem('az_ok','1');location.href='/pregled/'}else{document.querySelector('.greska').classList.add('vidi'); this.querySelector('input').value='';}">
  <input type="password" placeholder="Lozinka za pregled" autocomplete="off" required>
  <button type="submit">Uđi →</button>
</form>
<p class="greska">Pogrešna lozinka</p>

<a class="ig" href="https://www.instagram.com/andreazvonoofficial/" target="_blank" rel="noopener">@andreazvonoofficial</a>

</body>
</html>
